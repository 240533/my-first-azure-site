<!DOCTYPE html>
<html>
<head>
    <title>My Azure Lab</title>
    <style>
        /* This CSS centers the content and styles the page */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, Azure!</h1>
        <p>This site was deployed using Azure Static Web Apps (Free Tier).</p>
        <footer>Sehar Anwar</footer>
    </div>
</body>
</html>
